<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中一數學練習 | S1 Math Practice</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;color:#333}
.container{max-width:800px;margin:0 auto;padding:16px}
.header{text-align:center;padding:20px 0;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-radius:16px;margin-bottom:20px}
.header h1{font-size:24px;margin-bottom:4px}
.header p{font-size:14px;opacity:.9}
.stats-bar{display:flex;justify-content:space-around;background:#fff;border-radius:12px;padding:12px;margin-bottom:16px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
.stat{text-align:center}
.stat-num{font-size:24px;font-weight:700;color:#667eea}
.stat-label{font-size:12px;color:#888}
.mode-select{display:flex;gap:12px;margin-bottom:16px}
.mode-btn{flex:1;padding:16px;border:2px solid #e0e0e0;border-radius:12px;background:#fff;text-align:center;cursor:pointer;transition:.2s}
.mode-btn:hover,.mode-btn.active{border-color:#667eea;background:#667eea;color:#fff}
.mode-btn h3{font-size:16px;margin-bottom:4px}
.mode-btn p{font-size:12px;opacity:.8}
.topics-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:16px}
.topic-card{padding:14px;background:#fff;border-radius:10px;cursor:pointer;transition:.2s;box-shadow:0 1px 4px rgba(0,0,0,.06);text-align:center}
.topic-card:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(0,0,0,.12)}
.topic-card .emoji{font-size:28px;margin-bottom:6px}
.topic-card .name{font-size:13px;font-weight:600}
.topic-card .count{font-size:11px;color:#888}
.quiz-area{background:#fff;border-radius:16px;padding:24px;box-shadow:0 2px 12px rgba(0,0,0,.08)}
.question-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.q-num{font-size:14px;color:#667eea;font-weight:600}
.q-diff{font-size:12px;padding:4px 10px;border-radius:20px}
.diff-1{background:#e8f5e9;color:#2e7d32}
.diff-2{background:#fff3e0;color:#e65100}
.diff-3{background:#fce4ec;color:#c62828}
.question-text{font-size:18px;line-height:1.6;margin-bottom:20px;font-weight:500}
.question-text .en{font-size:14px;color:#666;margin-top:8px}
.options{display:flex;flex-direction:column;gap:10px}
.option{padding:14px 16px;border:2px solid #e8e8e8;border-radius:10px;cursor:pointer;transition:.2s;font-size:16px}
.option:hover{border-color:#667eea;background:#f5f5ff}
.option.correct{border-color:#4caf50;background:#e8f5e9}
.option.wrong{border-color:#f44336;background:#fce4ec}
.option.disabled{pointer-events:none}
.explanation{margin-top:16px;padding:16px;background:#f5f5ff;border-radius:10px;border-left:4px solid #667eea;display:none}
.explanation.show{display:block}
.explanation h4{color:#667eea;margin-bottom:8px}
.explanation p{font-size:14px;line-height:1.6}
.btn{padding:12px 24px;border:none;border-radius:10px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}
.btn-primary{background:#667eea;color:#fff}
.btn-primary:hover{background:#5a6fd6}
.btn-secondary{background:#e0e0e0;color:#333}
.btn-group{display:flex;gap:12px;margin-top:20px;justify-content:center}
.progress{width:100%;height:6px;background:#e0e0e0;border-radius:3px;margin-bottom:16px;overflow:hidden}
.progress-bar{height:100%;background:linear-gradient(90deg,#667eea,#764ba2);border-radius:3px;transition:.3s}
.hidden{display:none}
.lang-toggle{position:fixed;top:16px;right:16px;z-index:100}
.lang-btn{padding:6px 12px;border:1px solid #667eea;border-radius:20px;background:#fff;cursor:pointer;font-size:12px}
.lang-btn.active{background:#667eea;color:#fff}
.back-btn{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;margin-bottom:16px}
.back-btn:hover{background:#f5f5f5}
</style>
</head>
<body>
<div class="lang-toggle">
<button class="lang-btn active" onclick="setLang('zh')">中文</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
</div>

<div class="container">
<div class="header">
<h1>📐 中一數學練習</h1>
<p>Secondary 1 Mathematics Practice | 10,000 Questions</p>
</div>

<div class="stats-bar">
<div class="stat"><div class="stat-num" id="totalQ">10,000</div><div class="stat-label" data-zh="總題數" data-en="Total">總題數</div></div>
<div class="stat"><div class="stat-num" id="doneQ">0</div><div class="stat-label" data-zh="已完成" data-en="Done">已完成</div></div>
<div class="stat"><div class="stat-num" id="correctQ">0</div><div class="stat-label" data-zh="答對" data-en="Correct">答對</div></div>
<div class="stat"><div class="stat-num" id="accuracy">0%</div><div class="stat-label" data-zh="正確率" data-en="Accuracy">正確率</div></div>
</div>

<!-- HOME -->
<div id="homeView">
<div class="mode-select">
<div class="mode-btn active" onclick="setMode('topic')" id="modeTopic">
<h3 data-zh="📚 按課題" data-en="📚 By Topic">📚 按課題</h3>
<p data-zh="選擇特定課題練習" data-en="Choose specific topic">選擇特定課題練習</p>
</div>
<div class="mode-btn" onclick="setMode('random')" id="modeRandom">
<h3 data-zh="🎲 隨機練習" data-en="🎲 Random">🎲 隨機練習</h3>
<p data-zh="隨機混合所有課題" data-en="Mix all topics randomly">隨機混合所有課題</p>
</div>
</div>

<div id="topicSection">
<div class="topics-grid" id="topicsGrid"></div>
</div>

<div id="randomSection" class="hidden" style="text-align:center;padding:20px">
<p style="margin-bottom:16px;font-size:16px" data-zh="隨機抽取 10 題作答" data-en="Randomly pick 10 questions">隨機抽取 10 題作答</p>
<button class="btn btn-primary" onclick="startRandom()" data-zh="開始隨機練習" data-en="Start Random Practice">開始隨機練習</button>
</div>
</div>

<!-- QUIZ -->
<div id="quizView" class="hidden">
<button class="back-btn" onclick="goHome()" data-zh="← 返回" data-en="← Back">← 返回</button>
<div class="progress"><div class="progress-bar" id="progressBar"></div></div>
<div class="quiz-area">
<div class="question-header">
<span class="q-num" id="qNum"></span>
<span class="q-diff" id="qDiff"></span>
</div>
<div class="question-text" id="qText"></div>
<div class="options" id="qOptions"></div>
<div class="explanation" id="qExplanation">
<h4 data-zh="💡 解說" data-en="💡 Explanation">💡 解說</h4>
<p id="qExpText"></p>
</div>
<div class="btn-group" id="qButtons">
<button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()" style="display:none" data-zh="下一題 →" data-en="Next →">下一題 →</button>
<button class="btn btn-primary" id="finishBtn" onclick="finishQuiz()" style="display:none" data-zh="查看結果" data-en="See Results">查看結果</button>
</div>
</div>
</div>

<!-- RESULT -->
<div id="resultView" class="hidden" style="text-align:center">
<div class="quiz-area">
<h2 style="margin-bottom:16px" data-zh="🎉 練習完成！" data-en="🎉 Practice Complete!">🎉 練習完成！</h2>
<div style="font-size:60px;margin:20px 0" id="resultEmoji">🎯</div>
<div style="font-size:36px;font-weight:700;color:#667eea;margin-bottom:8px" id="resultScore"></div>
<div style="font-size:16px;color:#666;margin-bottom:24px" id="resultDetail"></div>
<button class="btn btn-primary" onclick="goHome()" data-zh="返回首頁" data-en="Back to Home">返回首頁</button>
</div>
</div>
</div>

<script>
let allQuestions=[];
let currentQuiz=[];
let currentIndex=0;
let correctCount=0;
let doneCount=0;
let lang='zh';
let mode='topic';

const topicEmojis={
'Algebraic Expressions':'🔤','Arithmetic Operations':'🔢','Area & Perimeter':'📏',
'Coordinate Geometry':'📍','Decimals':'🔢','Fractions':'🍕','Geometry - Angles':'📐',
'Indices & Powers':'💪','Inequalities':'⚖️','Integers':'➕','Linear Equations':'➗',
'Number Patterns':'🔍','Number Theory':'🧮','Percentages':'💯','Probability':'🎲',
'Ratio & Proportion':'⚖️','Sets':'📦','Standard Form & Estimation':'📊',
'Statistics':'📈','Volume & Surface Area':'📦'
};

const topicNames={
'Algebraic Expressions':{zh:'代數表達式',en:'Algebraic Expressions'},
'Arithmetic Operations':{zh:'四則運算',en:'Arithmetic'},
'Area & Perimeter':{zh:'面積與周界',en:'Area & Perimeter'},
'Coordinate Geometry':{zh:'坐標幾何',en:'Coordinate Geometry'},
'Decimals':{zh:'小數',en:'Decimals'},
'Fractions':{zh:'分數',en:'Fractions'},
'Geometry - Angles':{zh:'幾何 - 角',en:'Geometry - Angles'},
'Indices & Powers':{zh:'指數與冪',en:'Indices & Powers'},
'Inequalities':{zh:'不等式',en:'Inequalities'},
'Integers':{zh:'整數',en:'Integers'},
'Linear Equations':{zh:'一元一次方程',en:'Linear Equations'},
'Number Patterns':{zh:'數列規律',en:'Number Patterns'},
'Number Theory':{zh:'數論',en:'Number Theory'},
'Percentages':{zh:'百分數',en:'Percentages'},
'Probability':{zh:'概率',en:'Probability'},
'Ratio & Proportion':{zh:'比例',en:'Ratio & Proportion'},
'Sets':{zh:'集合',en:'Sets'},
'Standard Form & Estimation':{zh:'標準形式與估算',en:'Standard Form & Estimation'},
'Statistics':{zh:'統計學',en:'Statistics'},
'Volume & Surface Area':{zh:'體積與表面積',en:'Volume & Surface Area'}
};

fetch('questions.json').then(r=>r.json()).then(d=>{
allQuestions=d.questions;
renderTopics();
}).catch(e=>{
document.getElementById('topicsGrid').innerHTML='<p style="color:red;text-align:center;padding:20px">Error loading questions. Please make sure questions.json is in the same folder.</p>';
});

function renderTopics(){
const grid=document.getElementById('topicsGrid');
const topics=[...new Set(allQuestions.map(q=>q.topic_en))].sort();
grid.innerHTML=topics.map(t=>{
const count=allQuestions.filter(q=>q.topic_en===t).length;
const name=topicNames[t]||{zh:t,en:t};
return `<div class="topic-card" onclick="startTopic('${t}')">
<div class="emoji">${topicEmojis[t]||'📝'}</div>
<div class="name" data-zh="${name.zh}" data-en="${name.en}">${lang==='zh'?name.zh:name.en}</div>
<div class="count">${count} ${lang==='zh'?'題':'Q'}</div>
</div>`;
}).join('');
}

function setLang(l){
lang=l;
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(l==='zh'?'中文':'EN')));
document.querySelectorAll('[data-zh]').forEach(el=>{
el.textContent=l==='zh'?el.dataset.zh:el.dataset.en;
});
renderTopics();
}

function setMode(m){
mode=m;
document.getElementById('modeTopic').classList.toggle('active',m==='topic');
document.getElementById('modeRandom').classList.toggle('active',m==='random');
document.getElementById('topicSection').classList.toggle('hidden',m!=='topic');
document.getElementById('randomSection').classList.toggle('hidden',m!=='random');
}

function startTopic(topic){
currentQuiz=allQuestions.filter(q=>q.topic_en===topic).sort(()=>Math.random()-.5).slice(0,10);
startQuiz();
}

function startRandom(){
currentQuiz=allQuestions.sort(()=>Math.random()-.5).slice(0,10);
startQuiz();
}

function startQuiz(){
currentIndex=0;correctCount=0;
document.getElementById('homeView').classList.add('hidden');
document.getElementById('quizView').classList.remove('hidden');
document.getElementById('resultView').classList.add('hidden');
showQuestion();
}

function showQuestion(){
const q=currentQuiz[currentIndex];
const total=currentQuiz.length;
document.getElementById('progressBar').style.width=((currentIndex)/total*100)+'%';
document.getElementById('qNum').textContent=`${currentIndex+1} / ${total}`;
const diffLabels={1:lang==='zh'?'簡單':'Easy',2:lang==='zh'?'中等':'Medium',3:lang==='zh'?'困難':'Hard'};
document.getElementById('qDiff').textContent=diffLabels[q.difficulty]||'';
document.getElementById('qDiff').className='q-diff diff-'+q.difficulty;
document.getElementById('qText').innerHTML=lang==='zh'?q.question_zh:q.question_en;
if(lang==='en'&&q.question_en!==q.question_zh){
document.getElementById('qText').innerHTML+=`<div class="en">${q.question_zh}</div>`;
}
const opts=lang==='zh'?q.options_zh:q.options_en;
document.getElementById('qOptions').innerHTML=opts.map((o,i)=>
`<div class="option" onclick="checkAnswer(${i})">${String.fromCharCode(65+i)}. ${o}</div>`
).join('');
document.getElementById('qExplanation').classList.remove('show');
document.getElementById('nextBtn').style.display='none';
document.getElementById('finishBtn').style.display='none';
}

function checkAnswer(idx){
const q=currentQuiz[currentIndex];
const opts=document.querySelectorAll('.option');
opts.forEach((o,i)=>{
o.classList.add('disabled');
if(i===q.answer)o.classList.add('correct');
else if(i===idx)o.classList.add('wrong');
});
if(idx===q.answer)correctCount++;
doneCount++;
updateStats();
const exp=lang==='zh'?q.explanation_zh:q.explanation_en;
document.getElementById('qExpText').textContent=exp;
document.getElementById('qExplanation').classList.add('show');
if(currentIndex<currentQuiz.length-1){
document.getElementById('nextBtn').style.display='inline-block';
}else{
document.getElementById('finishBtn').style.display='inline-block';
}
}

function nextQuestion(){
currentIndex++;
showQuestion();
}

function finishQuiz(){
document.getElementById('quizView').classList.add('hidden');
document.getElementById('resultView').classList.remove('hidden');
const total=currentQuiz.length;
const pct=Math.round(correctCount/total*100);
document.getElementById('resultScore').textContent=`${correctCount} / ${total}`;
document.getElementById('resultDetail').textContent=lang==='zh'
?`正確率 ${pct}% | 共完成 ${doneCount} 題`
:`Accuracy ${pct}% | Total done: ${doneCount}`;
let emoji='😅';
if(pct>=90)emoji='🏆';
else if(pct>=70)emoji='🎉';
else if(pct>=50)emoji='👍';
document.getElementById('resultEmoji').textContent=emoji;
}

function goHome(){
document.getElementById('homeView').classList.remove('hidden');
document.getElementById('quizView').classList.add('hidden');
document.getElementById('resultView').classList.add('hidden');
}

function updateStats(){
document.getElementById('doneQ').textContent=doneCount;
document.getElementById('correctQ').textContent=correctCount;
document.getElementById('accuracy').textContent=doneCount>0?Math.round(correctCount/doneCount*100)+'%':'0%';
}
</script>
</body>
</html>
