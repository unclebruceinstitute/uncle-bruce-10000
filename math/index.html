<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>數學題庫 | Mathematics — 10,000 Questions</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang HK','Microsoft JhengHei',sans-serif;background:#f0f2f5;color:#333}
.container{max-width:800px;margin:0 auto;padding:16px}
.header{text-align:center;padding:24px 0;color:#fff;border-radius:16px;margin-bottom:20px;background:linear-gradient(135deg,#3498db,#3498dbcc)}
.header h1{font-size:26px;margin-bottom:4px}
.header p{font-size:14px;opacity:.9}
.top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.lang-toggle{display:flex;gap:4px}
.lang-btn{padding:6px 12px;border:1px solid #3498db;border-radius:20px;background:#fff;cursor:pointer;font-size:12px;transition:.2s;color:#3498db}
.lang-btn.active{background:#3498db;color:#fff}
.home-link{padding:8px 16px;border:1px solid #ddd;border-radius:8px;background:#fff;cursor:pointer;font-size:14px;text-decoration:none;color:#333;display:inline-block}
.home-link:hover{background:#f5f5f5}
.forms-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px;margin-bottom:24px}
.form-card{padding:24px 16px;background:#fff;border-radius:14px;cursor:pointer;transition:.25s;box-shadow:0 2px 8px rgba(0,0,0,.06);text-align:center;border:2px solid transparent;text-decoration:none;color:#333;display:block}
.form-card:hover{transform:translateY(-4px);box-shadow:0 8px 24px rgba(0,0,0,.15);border-color:#3498db}
.form-card .form-emoji{font-size:40px;margin-bottom:10px}
.form-card .form-zh{font-size:20px;font-weight:700;margin-bottom:4px}
.form-card .form-en{font-size:13px;color:#888}
.form-card .form-badge{display:inline-block;margin-top:10px;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:600}
.form-card.available .form-badge{background:#e8f5e9;color:#2e7d32}
.form-card.coming-soon .form-badge{background:#f5f5f5;color:#999}
.form-card.available{cursor:pointer}
.form-card.coming-soon{opacity:.65;cursor:default}
.form-card.coming-soon:hover{transform:none;box-shadow:0 2px 8px rgba(0,0,0,.06);border-color:transparent}
</style>
</head>
<body>
<div class="container">
<div class="top-bar">
<a class="home-link" href="../" data-zh="← 返回主頁" data-en="← Home">← 返回主頁</a>
<div class="lang-toggle">
<button class="lang-btn active" onclick="setLang('zh')">中文</button>
<button class="lang-btn" onclick="setLang('en')">EN</button>
</div>
</div>

<div class="header">
<h1 id="pageTitle" data-zh="📐 數學題庫" data-en="📐 Mathematics">📐 數學題庫</h1>
<p id="pageSub" data-zh="選擇年級開始練習" data-en="Select a form to begin">選擇年級開始練習</p>
</div>

<div class="forms-grid">
<a class="form-card available" href="s1/">
<div class="form-emoji">📐</div>
<div class="form-zh" data-zh="中一" data-en="S1">中一</div>
<div class="form-en" data-zh="Secondary 1" data-en="Secondary 1">Secondary 1</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
<a class="form-card available" href="s2/">
<div class="form-emoji">📏</div>
<div class="form-zh" data-zh="中二" data-en="S2">中二</div>
<div class="form-en" data-zh="Secondary 2" data-en="Secondary 2">Secondary 2</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
<a class="form-card available" href="s3/">
<div class="form-emoji">📊</div>
<div class="form-zh" data-zh="中三" data-en="S3">中三</div>
<div class="form-en" data-zh="Secondary 3" data-en="Secondary 3">Secondary 3</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
<a class="form-card available" href="s4/">
<div class="form-emoji">📈</div>
<div class="form-zh" data-zh="中四" data-en="S4">中四</div>
<div class="form-en" data-zh="Secondary 4" data-en="Secondary 4">Secondary 4</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
<a class="form-card available" href="s5/">
<div class="form-emoji">📉</div>
<div class="form-zh" data-zh="中五" data-en="S5">中五</div>
<div class="form-en" data-zh="Secondary 5" data-en="Secondary 5">Secondary 5</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
<a class="form-card available" href="s6/">
<div class="form-emoji">🎓</div>
<div class="form-zh" data-zh="中六" data-en="S6">中六</div>
<div class="form-en" data-zh="Secondary 6" data-en="Secondary 6">Secondary 6</div>
<div class="form-badge" data-zh="✓ 開始練習" data-en="✓ Start">✓ 開始練習</div>
</a>
</div>
</div>

<script>
let lang='zh';
const THEME='#3498db';
function setLang(l){
  lang=l;
  document.querySelectorAll('.lang-btn').forEach(b=>{b.classList.toggle('active',b.textContent.includes(l==='zh'?'中文':'EN'));if(b.classList.contains('active')){b.style.color='#fff';b.style.background=THEME}else{b.style.color=THEME;b.style.background='#fff'}});
  document.querySelectorAll('[data-zh]').forEach(el=>{if(el.dataset.zh&&el.dataset.en)el.textContent=l==='zh'?el.dataset.zh:el.dataset.en});
}
</script>
</body>
</html>
