<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>大B舅父萬題網</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'PingFang HK','Microsoft JhengHei',sans-serif;background:#f0f2f5;color:#333;min-height:100vh;display:flex;align-items:center;justify-content:center}
.container{max-width:600px;margin:0 auto;padding:24px;text-align:center}
.header{margin-bottom:32px}
.header h1{font-size:32px;margin-bottom:8px;background:linear-gradient(135deg,#e74c3c,#3b82f6,#10b981);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{font-size:16px;color:#666}
.cards{display:flex;flex-direction:column;gap:16px}
.card{display:flex;align-items:center;gap:16px;padding:20px 24px;background:#fff;border-radius:16px;text-decoration:none;color:#333;box-shadow:0 2px 12px rgba(0,0,0,.08);transition:.25s}
.card:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(0,0,0,.15)}
.card .emoji{font-size:40px;flex-shrink:0}
.card .info{text-align:left}
.card .info h2{font-size:20px;margin-bottom:4px}
.card .info p{font-size:14px;color:#888}
.card:nth-child(1){border-left:4px solid #10b981}
.card:nth-child(2){border-left:4px solid #3b82f6}
.card:nth-child(3){border-left:4px solid #e74c3c}
.footer{margin-top:32px;font-size:13px;color:#aaa}
</style>
</head>
<body>
<div class="container">
<div class="header">
<h1>🌐 大B舅父萬題網</h1>
<p>中一 MC 練習 | 30,000 題</p>
</div>

<div class="cards">
<a class="card" href="math/">
<div class="emoji">📐</div>
<div class="info">
<h2>數學</h2>
<p>正負數 · 代數 · 幾何 · 統計 · 百分數 · 10,000 題</p>
</div>
</a>
<a class="card" href="english/">
<div class="emoji">🇬🇧</div>
<div class="info">
<h2>英文</h2>
<p>Grammar · Vocabulary · Reading · 10,000 題</p>
</div>
</a>
<a class="card" href="chinese/">
<div class="emoji">📖</div>
<div class="info">
<h2>中文</h2>
<p>字詞 · 成語 · 修辭 · 文言 · 閱讀 · 10,000 題</p>
</div>
</a>
</div>

<div class="footer">© 2026 Uncle Bruce Institute</div>
</div>
</body>
</html>
